<template>
    <lightning-button label="Generate PDF" onclick={generatePDF}></lightning-button>

    <template if:true={handleGeneratePdfClick}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-label="Account Information Report"
            class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container" style="max-width:820px; width:92vw;">

                <!-- HEADER -->
                <header class="slds-modal__header slds-theme_shade" style="background:#1a3a5c; border-radius:4px 4px 0 0; padding:12px 20px;">
                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                        <div class="slds-grid slds-grid_vertical-align-center" style="gap:12px;">
                            <div style="background:#fff; border-radius:4px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                                <lightning-icon icon-name="standard:account" size="small"></lightning-icon>
                            </div>
                            <div>
                                <h2 class="slds-text-heading_small" style="color:#fff; font-weight:700; margin:0;">Account Information Report</h2>
                                <p style="color:#b8d4f0; font-size:11px; margin:0;">Salesforce CRM &mdash; System Generated</p>
                            </div>
                        </div>
                        <lightning-button-icon
                            icon-name="utility:close"
                            alternative-text="Close"
                            variant="bare-inverse"
                            onclick={handleModalCancel}>
                        </lightning-button-icon>
                    </div>
                </header>

                <!-- META BAR -->
                <div class="slds-grid" style="background:#f0f4f8; border-bottom:1px solid #ccc;">
                    <div class="slds-col slds-size_1-of-4 slds-p-around_x-small" style="border-right:1px solid #ddd;">
                        <p class="slds-text-body_small" style="color:#666; margin:0;">Date of Report</p>
                        <p class="slds-text-body_regular slds-text-color_default" style="font-weight:700; color:#1a3a5c; margin:0;">{today}</p>
                    </div>
                    <div class="slds-col slds-size_1-of-4 slds-p-around_x-small" style="border-right:1px solid #ddd;">
                        <p class="slds-text-body_small" style="color:#666; margin:0;">Record ID</p>
                        <p class="slds-text-body_regular" style="font-weight:700; color:#1a3a5c; margin:0;">{recordId}</p>
                    </div>
                    <div class="slds-col slds-size_1-of-4 slds-p-around_x-small" style="border-right:1px solid #ddd;">
                        <p class="slds-text-body_small" style="color:#666; margin:0;">Report Type</p>
                        <p class="slds-text-body_regular" style="font-weight:700; color:#1a3a5c; margin:0;">Account APF Report</p>
                    </div>
                    <div class="slds-col slds-size_1-of-4 slds-p-around_x-small">
                        <p class="slds-text-body_small" style="color:#666; margin:0;">Prepared By</p>
                        <p class="slds-text-body_regular" style="font-weight:700; color:#1a3a5c; margin:0;">Sales Team</p>
                    </div>
                </div>

                <div class="slds-modal__content slds-p-around_none" style="max-height:55vh; overflow-y:auto;">

                    <!-- ACCOUNT INFORMATION -->
                    <div style="border-bottom:2px solid #1a3a5c;">
                        <div style="background:#1a3a5c; color:#fff; padding:7px 16px; font-size:12px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase;">
                            Account Information
                        </div>
                        <table style="width:100%; border-collapse:collapse;">
                            <tbody>
                                <tr>
                                    <td style="background:#f7f8fa; color:#555; font-weight:700; width:18%; border-right:1px solid #e0e0e0; border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">Account Name</td>
                                    <td style="width:32%; border-right:1px solid #e8e8e8; border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">{accountName}</td>
                                    <td style="background:#f7f8fa; color:#555; font-weight:700; width:18%; border-right:1px solid #e0e0e0; border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">Type</td>
                                    <td style="border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">{type}</td>
                                </tr>
                                <tr>
                                    <td style="background:#f7f8fa; color:#555; font-weight:700; border-right:1px solid #e0e0e0; font-size:12px; padding:6px 14px;">Industry</td>
                                    <td style="border-right:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">{industry}</td>
                                    <td style="background:#f7f8fa; color:#555; font-weight:700; border-right:1px solid #e0e0e0; font-size:12px; padding:6px 14px;">Rating</td>
                                    <td style="font-size:12px; padding:6px 14px;">{rating}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- RELATED CONTACTS -->
                    <div style="border-bottom:2px solid #1a3a5c;">
                        <div style="background:#1a3a5c; color:#fff; padding:7px 16px; font-size:12px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase;">
                            Related Contacts
                        </div>
                        <template if:true={hasContacts}>
                            <template for:each={contacts} for:item="con">
                                <div key={con.Id} style="border-bottom:1px solid #dce3ec;">
                                    <!-- Contact number sub-header -->
                                    <div style="background:#2c5282; color:#b8d4f0; padding:4px 14px; font-size:11px; font-weight:700; letter-spacing:0.4px;">
                                        Contact #{con.index}
                                    </div>
                                    <table style="width:100%; border-collapse:collapse;">
                                        <tbody>
                                            <tr>
                                                <td style="background:#f7f8fa; color:#555; font-weight:700; width:18%; border-right:1px solid #e0e0e0; border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">Name</td>
                                                <td style="width:32%; border-right:1px solid #e8e8e8; border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">{con.Name}</td>
                                                <td style="background:#f7f8fa; color:#555; font-weight:700; width:18%; border-right:1px solid #e0e0e0; border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">Phone</td>
                                                <td style="border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">{con.Phone}</td>
                                            </tr>
                                            <tr>
                                                <td style="background:#f7f8fa; color:#555; font-weight:700; border-right:1px solid #e0e0e0; font-size:12px; padding:6px 14px;">Email</td>
                                                <td colspan="3" style="font-size:12px; padding:6px 14px;">{con.Email}</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                        </template>
                        <template if:false={hasContacts}>
                            <p style="padding:12px 16px; color:#888; font-style:italic; font-size:12px; margin:0;">No contacts found.</p>
                        </template>
                    </div>

                    <!-- RELATED OPPORTUNITIES -->
                    <div style="border-bottom:2px solid #1a3a5c;">
                        <div style="background:#1a3a5c; color:#fff; padding:7px 16px; font-size:12px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase;">
                            Related Opportunities
                        </div>
                        <template if:true={hasOpportunities}>
                            <template for:each={opportunities} for:item="opp">
                                <div key={opp.Id} style="border-bottom:1px solid #dce3ec;">
                                    <!-- Opportunity number sub-header -->
                                    <div style="background:#2c5282; color:#b8d4f0; padding:4px 14px; font-size:11px; font-weight:700; letter-spacing:0.4px;">
                                        Opportunity #{opp.index}
                                    </div>
                                    <table style="width:100%; border-collapse:collapse;">
                                        <tbody>
                                            <tr>
                                                <td style="background:#f7f8fa; color:#555; font-weight:700; width:18%; border-right:1px solid #e0e0e0; border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">Name</td>
                                                <td style="width:32%; border-right:1px solid #e8e8e8; border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">{opp.Name}</td>
                                                <td style="background:#f7f8fa; color:#555; font-weight:700; width:18%; border-right:1px solid #e0e0e0; border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">Stage</td>
                                                <td style="border-bottom:1px solid #e8e8e8; font-size:12px; padding:6px 14px;">{opp.StageName}</td>
                                            </tr>
                                            <tr>
                                                <td style="background:#f7f8fa; color:#555; font-weight:700; border-right:1px solid #e0e0e0; font-size:12px; padding:6px 14px;">Close Date</td>
                                                <td colspan="3" style="font-size:12px; padding:6px 14px;">{opp.CloseDate}</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                        </template>
                        <template if:false={hasOpportunities}>
                            <p style="padding:12px 16px; color:#888; font-style:italic; font-size:12px; margin:0;">No opportunities found.</p>
                        </template>
                    </div>

                </div>

                <!-- FOOTER NOTE -->
                <div style="text-align:center; font-size:10px; color:#aaa; padding:6px; background:#fafafa; border-top:0.5px solid #eee; font-style:italic;">
                    This is a system generated report
                </div>

                <footer class="slds-modal__footer" style="background:#f0f4f8; border-top:1px solid #ccc; padding:10px 16px; display:flex; justify-content:flex-end; gap:8px;">
                    <lightning-button label="Cancel" onclick={handleModalCancel}></lightning-button>
                    <lightning-button label="Download PDF" variant="brand" onclick={handleDownloadPDF}></lightning-button>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
