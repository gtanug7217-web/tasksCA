<template>
    <lightning-card title="Update Record Without Apex">
        
        <div class="slds-m-around_medium">

            <lightning-input 
                type="text" 
                label="Account ID" 
                value={idValue}
                onchange={handleIdChange}>
            </lightning-input>

            <lightning-input 
                type="text" 
                label="Account Name" 
                value={nameValue}
                onchange={handleNameChange}>
            </lightning-input>

            <div class="slds-m-top_medium">

                <lightning-button 
                    label="Update Record" 
                    variant="brand" 
                    onclick={handleClick}>
                </lightning-button>

                <lightning-button 
                    class="slds-m-left_small"
                    type="reset" 
                    label="Reset">
                </lightning-button>

            </div>

        </div>

    </lightning-card>
</template>
